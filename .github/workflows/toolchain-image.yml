name: toolchain-image

on:
  push:
    branches: [main, 'build/**']
    paths:
      - 'toolchain/**'
      - 'verify_rom/**'
      - 'fixtures/**'
      - '.github/workflows/toolchain-image.yml'
  pull_request:
    paths:
      - 'toolchain/**'
      - 'verify_rom/**'
      - 'fixtures/**'
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: >-
          Push the built image to GHCR (private). This is the P0-LIC
          licensing gate (SYSTEM_PLAN.md §4.3, unresolved as of writing) —
          only enable this with a deliberate decision to publish, even
          privately.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # P0-A2: the smoke suite is baked into toolchain/Dockerfile itself —
      # it builds the known-good and known-bad-oam fixtures from source
      # inside the image and asserts verify_rom's verdict on each (good
      # must PASS, bad-oam must FAIL). A regression fails this build step
      # directly; there is no separate smoke-test step to keep in sync.
      - name: Build toolchain image
        run: docker build -f toolchain/Dockerfile -t gba-studio-toolchain:ci .

  # Separate job (not a step in `build`) so the `packages: write` token only
  # exists for the one path that needs it — an ordinary push/PR never gets
  # it. Rebuilds the image rather than passing it between jobs: this path
  # only runs on a deliberate manual dispatch, so the extra build cost is a
  # non-issue and it avoids the complexity of a docker save/upload-artifact/
  # download-artifact/load round-trip for something rarely triggered.
  push:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.push_to_ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain image
        run: docker build -f toolchain/Dockerfile -t gba-studio-toolchain:ci .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (private)
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/gba-studio-toolchain"
          docker tag gba-studio-toolchain:ci "$image:${{ github.sha }}"
          docker tag gba-studio-toolchain:ci "$image:dev"
          docker push "$image:${{ github.sha }}"
          docker push "$image:dev"
